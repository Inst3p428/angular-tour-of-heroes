<h2>Top Heroes</h2>
<div class="heroes-menu">
  <a *ngFor="let hero of heroes" [routerLink]="['/detail', hero.id]">
      {{hero.name}}
  </a>
</div> 

<section class="chart-panel">
  <h3>Hero Power Levels</h3>
  <div class="chart-container">
    <canvas #heroPowerChart></canvas>
  </div>
</section>
